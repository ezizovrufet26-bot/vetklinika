providers = ['node']

[phases.setup]
nixPkgs = ['nodejs_22']
# puppeteer (whatsapp-web.js asılılığı) headless Chromium-un işləməsi üçün bu
# paylaşılan kitabxanaları tələb edir — Railway-in standart Node imicində yoxdur.
# Referans: github.com/ryannono/Puppeteer-Railway-Buildpack/blob/main/nixpacks.toml
aptPkgs = [
  'fonts-liberation',
  'libappindicator3-1',
  'libasound2t64', # Ubuntu 24.04 (noble) t64 keçidi ilə 'libasound2' bu ada dəyişib
  'libatk-bridge2.0-0',
  'libatk1.0-0',
  'libgbm1',
  'libgtk-3-0',
  'libnspr4',
  'libnss3',
  'libx11-xcb1',
  'libxcomposite1',
  'libxcursor1',
  'libxdamage1',
  'libxfixes3',
  'libxi6',
  'libxrandr2',
  'libxss1',
  'libxtst6',
  'xdg-utils',
  'ca-certificates',
  'libcairo2',
  'libcups2',
  'libdbus-1-3',
  'libexpat1',
  'libfontconfig1',
  'libglib2.0-0',
  'libpango-1.0-0',
  'libpangocairo-1.0-0',
  'libx11-6',
  'libxcb1',
  'libxext6',
  'libxrender1',
  'lsb-release',
  'wget',
  # Səsli mesaj cavabı (mp3→ogg/opus) üçün — bu olmadan hər səsli cavab
  # səssizcə mətn fallback-a düşür, heç bir xəta göstərmir.
  'ffmpeg'
]
